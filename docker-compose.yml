# ============================================================================
# Sent Below - Docker Compose for ML Training & Serving
# ============================================================================
# Usage:
#   docker compose up train        # Run training pipeline
#   docker compose up serve        # Start model serving API
#   docker compose up tensorboard  # Launch TensorBoard dashboard
#   docker compose up train serve  # Train then serve
# ============================================================================

services:
  # -------------------------------------------------------------------------
  # ML Training Pipeline
  # -------------------------------------------------------------------------
  train:
    build:
      context: .
      target: train
    volumes:
      - ./models:/app/models        # Persist trained model checkpoints
      - ./runs:/app/runs            # TensorBoard logs
    environment:
      - EPOCHS=200
      - BATCH_SIZE=64
      - LEARNING_RATE=1e-3
      - DEVICE=cpu                  # Set to 'cuda' for GPU instances
      - TENSORBOARD_LOG_DIR=/app/runs
      # AWS — leave blank for local-only mode
      - AWS_REGION=${AWS_REGION:-ca-central-1}
      - MODEL_BUCKET=${MODEL_BUCKET:-}
      - MODEL_REGISTRY_TABLE=${MODEL_REGISTRY_TABLE:-}
    deploy:
      resources:
        limits:
          memory: 4G

  # -------------------------------------------------------------------------
  # Model Serving API (FastAPI + Uvicorn)
  # -------------------------------------------------------------------------
  serve:
    build:
      context: .
      target: serve
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models        # Mount trained models
    environment:
      - MODEL_DIR=/app/models
      - DEVICE=cpu
      - LOG_LEVEL=info
      # AWS — set these to load models from S3 at startup
      - AWS_REGION=${AWS_REGION:-ca-central-1}
      - MODEL_BUCKET=${MODEL_BUCKET:-}
      - MODEL_S3_PREFIX=${MODEL_S3_PREFIX:-}
      - MODEL_REGISTRY_TABLE=${MODEL_REGISTRY_TABLE:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G

  # -------------------------------------------------------------------------
  # TensorBoard - Experiment Visualization
  # -------------------------------------------------------------------------
  tensorboard:
    image: tensorflow/tensorflow:latest
    command: tensorboard --logdir=/runs --host=0.0.0.0 --port=6006
    ports:
      - "6006:6006"
    volumes:
      - ./runs:/runs
