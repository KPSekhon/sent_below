# ============================================================================
# CI/CD Pipeline for ML Model Training, Testing, and Deployment
# ============================================================================
# Triggers:
#   - Push to main: Full pipeline (test -> train -> benchmark -> deploy)
#   - Pull request: Test + benchmark only (no deployment)
#   - Manual dispatch: Configurable training parameters
#
# Demonstrates:
#   - Automated ML model testing and validation
#   - Cloud-based training with artifact management
#   - Model benchmarking with regression detection
#   - Docker image build and push to container registry
#   - Staged deployment (staging -> production)
# ============================================================================

name: ML Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'ai/**'
      - 'training/**'
      - 'serving/**'
      - 'config.py'
  pull_request:
    branches: [main]
    paths:
      - 'ai/**'
      - 'training/**'
      - 'serving/**'
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Training epochs'
        default: '200'
        type: string
      device:
        description: 'Training device (cpu/cuda)'
        default: 'cpu'
        type: string

env:
  PYTHON_VERSION: '3.12'
  TORCH_VERSION: '2.2.0'

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Lint and Unit Tests
  # -------------------------------------------------------------------------
  test:
    name: Test AI Models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install torch==${{ env.TORCH_VERSION }} --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pygame-ce pytest

      - name: Test Enemy AI (DQN)
        run: python ai/enemy_ai.py

      - name: Test AI Director (DDA)
        run: python ai/director.py

      - name: Test Data Pipeline
        run: python ai/data_pipeline.py

      - name: Test A/B Framework
        run: python ai/ab_testing.py

      - name: Test Model Import
        run: |
          python -c "
          from ai.enemy_ai import EnemyBrain, EnemyNetwork
          from ai.director import AIDirector, PlayerModel
          from ai.data_pipeline import EventLogger, DataProcessor
          from ai.ab_testing import ABTestRunner, Experiment, Variant
          import torch
          import numpy as np

          # Verify model architectures
          brain = EnemyBrain()
          assert sum(p.numel() for p in brain.policy_net.parameters()) > 0
          print('All model imports and initialization OK')
          "

  # -------------------------------------------------------------------------
  # Job 2: Model Benchmark (Performance Regression Detection)
  # -------------------------------------------------------------------------
  benchmark:
    name: Benchmark Models
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install torch==${{ env.TORCH_VERSION }} --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pygame-ce

      - name: Run benchmark
        run: python -m training.benchmark --iterations 500 --output reports/benchmark.json

      - name: Check latency budget
        run: |
          python -c "
          import json
          with open('reports/benchmark.json') as f:
              report = json.load(f)
          budget = report['frame_budget']
          pct = budget['ai_budget_pct']
          print(f'AI uses {pct:.1f}% of frame budget')
          assert pct < 50, f'AI inference exceeds 50% of frame budget ({pct:.1f}%)'
          print('Latency budget check PASSED')
          "

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: reports/benchmark.json

  # -------------------------------------------------------------------------
  # Job 3: Training Pipeline (on push to main or manual)
  # -------------------------------------------------------------------------
  train:
    name: Train Models
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install torch==${{ env.TORCH_VERSION }} --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pygame-ce tensorboard

      - name: Run training pipeline
        run: |
          python -m training.train_pipeline \
            --epochs ${{ github.event.inputs.epochs || '100' }} \
            --device ${{ github.event.inputs.device || 'cpu' }} \
            --batch-size 64 \
            --model-dir models \
            --tensorboard-log-dir runs

      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Upload TensorBoard logs
        uses: actions/upload-artifact@v4
        with:
          name: tensorboard-logs
          path: runs/

  # -------------------------------------------------------------------------
  # Job 4: Build and Push Docker Image
  # -------------------------------------------------------------------------
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, benchmark]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build serve image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: serve
          push: false
          tags: sent-below-serve:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build train image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: train
          push: false
          tags: sent-below-train:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
